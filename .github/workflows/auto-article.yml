name: Auto Article Agent

on:
  schedule:
    # Every 3 days at 3 AM UTC (10 AM WIB)
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # ── Python Setup ───────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: scripts/agent/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/agent/requirements.txt

      # ── Node.js Setup ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      # ── Run Agent Pipeline ─────────────────────────────────
      - name: Run Auto Article Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/agent/main.py

      # ── Validate Build ─────────────────────────────────────
      - name: Validate Astro build
        run: npm run build

      # ── Commit & Push ──────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "Article Bot"
          git config user.email "bot@joomha.dev"

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          COMMIT_DATE=$(date +%Y-%m-%d)
          git commit -m "feat: auto article ${COMMIT_DATE}"
          git push
